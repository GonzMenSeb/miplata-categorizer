version: 1
language: es-CO
description: >
  Taxonomía jerárquica de categorías para transacciones financieras personales
  en Colombia. Dos niveles (padre > hijo). `implemented: false` marca categorías
  que existen como contrato pero aún no tienen reglas/ejemplos cargados ("carcass"
  para implementar más adelante). Los ejemplos son descripciones reales observadas
  en extractos de Bancolombia, Nequi y tarjetas de crédito.

categories:

